parameters:
- name: filename
  type: string

trigger: none
pr: none

jobs:
- job: springfield
  variables:
  - group: common
  - template: /.azuredevops/variables-global.yml
  pool: ${{ variables.GFX942_TEST_POOL }}
  workspace:
    clean: all
  steps:
    - checkout: none
    - task: Bash@3
      displayName: Download installer
      env:
        SPRINGFIELD_URL: $(SPRINGFIELD_URL)
      inputs:
        targetType: inline
        script: wget -nv "$SPRINGFIELD_URL/rocm/${{ parameters.filename }}" -O rocm-installer.run
    - task: Bash@3
      displayName: Install ROCm
      inputs:
        targetType: inline
        script: |
          sudo DEBIAN_FRONTEND=noninteractive apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y tzdata
          sudo DEBIAN_FRONTEND=noninteractive apt upgrade -y
          mkdir -p $(Agent.BuildDirectory)
          chmod +x ./rocm-installer.run
          ./rocm-installer.run target="$(Agent.BuildDirectory)" deps=install rocm postrocm
    - task: Bash@3
      displayName: List files
      inputs:
        targetType: inline
        script: ls -la1R $(Agent.BuildDirectory)
    - task: Bash@3
      displayName: Setup & basic tests
      inputs:
        targetType: inline
        script: |
          export ROCM_PATH=$(Agent.BuildDirectory)/rocm
          export PATH=$PATH:$ROCM_PATH/bin
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$ROCM_PATH/lib:$ROCM_PATH/llvm/lib
          export CXX=$ROCM_PATH/bin/amdclang++
          export CC=$ROCM_PATH/bin/amdclang

          echo "##vso[task.setvariable variable=ROCM_PATH]$ROCM_PATH"
          echo "##vso[task.prependpath]$ROCM_PATH/bin"
          echo "##vso[task.setvariable variable=LD_LIBRARY_PATH]$LD_LIBRARY_PATH"
          echo "##vso[task.setvariable variable=CXX]$CXX"
          echo "##vso[task.setvariable variable=CC]$CC"
    - task: Bash@3
      displayName: rocminfo
      inputs:
        targetType: inline
        script: rocminfo
    - task: Bash@3
      displayName: rocm_agent_enumerator
      inputs:
        targetType: inline
        script: rocm_agent_enumerator
    - task: Bash@3
      displayName: rocm-smi
      inputs:
        targetType: inline
        script: rocm-smi
    - task: Bash@3
      displayName: amd-smi
      inputs:
        targetType: inline
        script: amd-smi
